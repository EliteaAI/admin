name: Tests

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tests/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r tests/requirements-dev.txt

      - name: Run unit tests
        run: python tests/run_tests.py -m unit -v
